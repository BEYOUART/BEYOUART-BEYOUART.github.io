<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beyouart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #111;
}

nav {
  position: sticky;
  top: 0;
  width: 100%;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 16px 20px;
  display: flex;
  justify-content: center;
  gap: 28px;
}

nav a {
  text-decoration: none;
  color: #111;
  font-size: 13px;
  letter-spacing: 1px;
  opacity: 0.8;
}

nav a:hover {
  opacity: 1;
}

header {
  text-align: center;
  padding: 70px 20px 40px;
}

.logo {
  width: 220px;
  max-width: 80vw;
  opacity: 0;
  transform: scale(0.95);
  animation: logoIntro 1s ease forwards;
}

.tagline {
  margin-top: 12px;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: lowercase;
  opacity: 0;
  animation: fadeTagline 1.2s ease forwards;
  animation-delay: 0.5s;
}

.container {
  max-width: 1100px;
  margin: 20px auto 80px;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.card {
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 12px;
}

.card h3 {
  font-size: 16px;
  margin-bottom: 8px;
}

.price {
  margin-bottom: 12px;
  opacity: 0.8;
}

button {
  border: none;
  background: #111;
  color: #fff;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

footer {
  text-align: center;
  padding: 40px 20px;
  font-size: 12px;
  opacity: 0.6;
}

@keyframes logoIntro {
  to { opacity: 1; transform: scale(1); }
}

@keyframes fadeTagline {
  to { opacity: 0.7; }
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT ME</a>
    <a href="contact.html">CONTACT</a>
  </div>
</nav>

<header>
  <img src="Untitlvvv.png" alt="beyouart Logo" class="logo">
  <div class="tagline">express yourself</div>
</header>

<div class="container" id="productContainer"></div>

<footer>
© 2026 beyouart · All rights reserved
</footer>

<script>
const fallbackPrices = {
  "https://buy.stripe.com/7sY9ATgRjdZm5OTa3m3Nm04": "$5.00",
  "https://buy.stripe.com/9B6bJ144x1cAgtx1wQ3Nm07": "$7.00",
  "https://buy.stripe.com/3cI9AT58BbRe7X1cbu3Nm08": "$5.00",
  "https://buy.stripe.com/fZueVd44x9J6b9dcbu3Nm01": "$7.00",
  "https://buy.stripe.com/bJe00j0SldZm4KP1wQ3Nm03": "$5.00",
  "https://buy.stripe.com/dRmeVd8kN3kIb9d8Zi3Nm02": "$7.00",
  "https://buy.stripe.com/28EaEX0SlcVia590sM3Nm06": "$5.00",
  "https://buy.stripe.com/aFa5kD6cFf3qa597Ve3Nm05": "$7.00"
};

const products = Object.entries(fallbackPrices).map(([link, price], idx) => ({
  name: `Product ${idx + 1}`,
  image: "https://via.placeholder.com/400x400?text=beyouart",
  price,
  link
}));

const container = document.getElementById('productContainer');
products.forEach(product => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${product.image}" alt="${product.name}">
    <h3>${product.name}</h3>
    <div class="price">${product.price}</div>
    <a href="${product.link}" target="_blank" rel="noopener noreferrer"><button>Buy</button></a>
  `;
  container.appendChild(card);
});
</script>

</body>
</html>
